<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 번호 5게임 추천기</title>

  <style>
    :root {
      --bg-color: #f5f7fb;
      --container-bg: white;
      --text-main: #222;
      --text-sub: #555;
      --primary-color: #2563eb;
      --primary-hover: #1d4ed8;
      --game-bg: #f9fafb;
      --game-border: #e5e7eb;
      --game-title: #374151;
      --ball-bg: #facc15;
      --ball-text: #111;
      --message-text: #666;
    }

    [data-theme="dark"] {
      --bg-color: #1a1a1a;
      --container-bg: #2d2d2d;
      --text-main: #f0f0f0;
      --text-sub: #ccc;
      --primary-color: #3b82f6;
      --primary-hover: #60a5fa;
      --game-bg: #3d3d3d;
      --game-border: #4a4a4a;
      --game-title: #e5e7eb;
      --ball-bg: #fbbf24;
      --ball-text: #000;
      --message-text: #aaa;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg-color);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }

    .container {
      width: 90%;
      max-width: 700px;
      padding: 40px 30px;
      background: var(--container-bg);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      text-align: center;
      position: relative;
    }

    .theme-toggle {
      position: absolute;
      top: 20px;
      right: 20px;
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      padding: 0;
    }

    h1 {
      margin-bottom: 10px;
      color: var(--primary-color);
    }

    p {
      color: var(--text-sub);
      margin-bottom: 30px;
    }

    button.generate-btn {
      padding: 14px 24px;
      background: var(--primary-color);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button.generate-btn:hover {
      background: var(--primary-hover);
    }

    .games {
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .game {
      padding: 16px;
      background: var(--game-bg);
      border-radius: 14px;
      border: 1px solid var(--game-border);
    }

    .game-title {
      font-weight: bold;
      margin-bottom: 12px;
      color: var(--game-title);
    }

    .numbers {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .ball {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--ball-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 17px;
      color: var(--ball-text);
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    .message {
      margin-top: 20px;
      font-size: 14px;
      color: var(--message-text);
    }

    /* Contact Form Styles */
    .contact-section {
      margin-top: 50px;
      padding-top: 30px;
      border-top: 1px solid var(--game-border);
      text-align: left;
    }

    .contact-section h2 {
      font-size: 20px;
      margin-bottom: 20px;
      color: var(--primary-color);
      text-align: center;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
      font-size: 14px;
    }

    .form-group input, 
    .form-group textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--game-border);
      border-radius: 8px;
      background: var(--game-bg);
      color: var(--text-main);
      font-size: 14px;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus, 
    .form-group textarea:focus {
      border-color: var(--primary-color);
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: var(--primary-color);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }

    .submit-btn:hover {
      background: var(--primary-hover);
    }
  </style>
</head>

<body>
  <div class="container">
    <button class="theme-toggle" onclick="toggleTheme()" id="theme-toggle">☀️</button>
    <h1>로또 번호 5게임 추천기</h1>
    <p>버튼을 누르면 로또 번호 5게임이 한 번에 추천됩니다.</p>

    <button class="generate-btn" onclick="generateFiveGames()">5게임 추천받기</button>

    <div class="games" id="games"></div>
    <div class="message" id="message"></div>

    <!-- Contact Form Section -->
    <div class="contact-section">
      <h2>제휴 문의</h2>
      <form action="https://formspree.io/f/xnjwjdow" method="POST">
        <div class="form-group">
          <label for="name">성함 / 업체명</label>
          <input type="text" name="name" id="name" placeholder="이름 또는 회사명을 입력하세요" required>
        </div>
        <div class="form-group">
          <label for="email">이메일 주소</label>
          <input type="email" name="_replyto" id="email" placeholder="email@example.com" required>
        </div>
        <div class="form-group">
          <label for="message-content">문의 내용</label>
          <textarea name="message" id="message-content" rows="4" placeholder="문의하실 내용을 입력하세요" required></textarea>
        </div>
        <button type="submit" class="submit-btn">문의 보내기</button>
      </form>
    </div>
  </div>

  <script>
    // Theme logic
    function initTheme() {
      const savedTheme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
      updateToggleIcon(savedTheme);
    }

    function toggleTheme() {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      updateToggleIcon(newTheme);
    }

    function updateToggleIcon(theme) {
      const btn = document.getElementById('theme-toggle');
      btn.textContent = theme === 'dark' ? '🌙' : '☀️';
    }

    initTheme();

    function generateOneGame() {
      const lottoNumbers = [];

      while (lottoNumbers.length < 6) {
        const randomNumber = Math.floor(Math.random() * 45) + 1;

        if (!lottoNumbers.includes(randomNumber)) {
          lottoNumbers.push(randomNumber);
        }
      }

      lottoNumbers.sort((a, b) => a - b);

      return lottoNumbers;
    }

    function generateFiveGames() {
      const gamesDiv = document.getElementById("games");
      const messageDiv = document.getElementById("message");

      gamesDiv.innerHTML = "";

      for (let i = 1; i <= 5; i++) {
        const numbers = generateOneGame();

        const gameDiv = document.createElement("div");
        gameDiv.className = "game";

        const title = document.createElement("div");
        title.className = "game-title";
        title.textContent = i + "게임";

        const numbersDiv = document.createElement("div");
        numbersDiv.className = "numbers";

        numbers.forEach(number => {
          const ball = document.createElement("div");
          ball.className = "ball";
          ball.textContent = number;
          numbersDiv.appendChild(ball);
        });

        gameDiv.appendChild(title);
        gameDiv.appendChild(numbersDiv);
        gamesDiv.appendChild(gameDiv);
      }

      messageDiv.textContent = "행운을 빕니다!";
    }
  </script>
</body>
</html>
